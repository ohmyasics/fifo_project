name: fifo-regression

on:
  push:
  pull_request:

jobs:
  regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install simulator
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Run regression
        run: make -C scripts ci
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fifo-regression
          path: |
            waves/*.log
            waves/*.vcd
